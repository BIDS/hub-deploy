[workspace]
authors = ["Min RK <benjaminrk@gmail.com>"]
channels = ["conda-forge"]
name = "user"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"

[tasks]
install-opencode = "bash install-opencode.sh"

[dependencies]
python = "3.12.*"
jupyterlab = ">=4.5.7,<5"
jupyter-ai = ">=3.0.0,<4"
matplotlib-base = ">=3.10.9,<4"
scipy = ">=1.17.1,<2"
altair = ">=6.1.0,<7"
jupyterlab_code_formatter = ">=3.0.3,<4"
ipywidgets = ">=8.1.8,<9"
jupyter-book = ">=2.1.5,<3"
jupyterhub-singleuser = ">=5.4.6,<6"
nodejs = "24.*"
pandas = ">=3.0.3,<4"
geopandas = ">=1.1.3,<2"
polars = ">=1.40.1,<2"
pixi = ">=0.68.1,<0.69"
mamba = ">=2.6.1,<3"
curl = ">=8.20.0,<9"
