{{- with .Values.jupyterhub.singleuser.serviceAccountName }}
# Dedicated Kubernetes service account for singleuser server pods. Lets GCP
# Workload Identity grants target only user servers (principal .../sa/<this>)
# instead of the whole namespace, keeping them off the hub control plane and
# off dask worker pods (which run user-built images on the `default` SA).
# Selected via jupyterhub.singleuser.serviceAccountName; no annotations are
# needed since grants use the direct-resource WI principal, not GSA
# impersonation. Only rendered for hubs that set `singleuser.serviceAccountName`.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ . }}
  namespace: {{ $.Release.Namespace }}
{{- end }}
