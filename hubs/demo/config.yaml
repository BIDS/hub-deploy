jupyterhub:
  httpRoute:
    hostnames:
      - aifutureslab-hub.bids.berkeley.edu
  hub:
    services:
      dask-gateway:
        url: http://traefik-demo-dask-gateway
        display: false
    loadRoles:
      user:
        scopes:
          - self
          # grant users access to services
          - access:services
    config:
      Authenticator:
        enable_auth_state: true
      JupyterHub:
        authenticator_class: cilogon
        # authenticator_class: github
        public_url: https://aifutureslab-hub.bids.berkeley.edu
      OAuthenticator:
        oauth_callback_url: https://aifutureslab-hub.bids.berkeley.edu/hub/oauth_callback
      CILogonOAuthenticator:
        scope:
          - openid
          - email
          - profile
          - org.cilogon.userinfo
        idps:
          urn:mace:incommon:berkeley.edu:
            default: true
            username_derivation:
              username_claim: eppn
          urn:mace:incommon:ucdavis.edu:
            username_derivation:
              username_claim: eppn
          urn:mace:incommon:ucsf.edu:
            username_derivation:
              username_claim: eppn
          http://github.com/login/oauth/authorize:
            username_derivation:
              username_claim: preferred_username
              action: prefix
              prefix: github
      GenericOAuthenticator:
        login_service: CalNet
        username_claim: sub
        authorize_url: https://auth.berkeley.edu/cas/oidc/oidcAuthorize
        token_url: https://auth.berkeley.edu/cas/oidc/oidcAccessToken
        userdata_url: https://auth.berkeley.edu/cas/oidc/oidcProfile
        scope:
          - openid
          - profile
          - berkeley_edu_default
      GenericOAuthenticator_calnet:
        login_service: CalNet
        username_claim: sub
        oauth_callback_url: https://aifutureslab-hub.bids.berkeley.edu/hub/oauth_callback
        authorize_url: https://auth.berkeley.edu/cas/oidc/oidcAuthorize
        token_url: https://auth.berkeley.edu/cas/oidc/oidcAccessToken
        userdata_url: https://auth.berkeley.edu/cas/oidc/oidcProfile
        scope:
          - openid
          - profile
          - berkeley_edu_default
      GitHubOAuthenticator:
        allowed_organizations:
          - "bids-access:aifutures-hub-users"
        admin_groups:
          - "admins"
        manage_groups: true
        populate_teams_in_auth_state: true
        scope:
          - "user:email"
          - "read:org"
      Spawner:
        server_token_scopes:
          - access:services!service=dask-gateway
    extraConfig:
      team_groups: |
        def access_team_groups(auth_state):
          # id of bids-access github organization
          access_org_id = 239249075
          access_teams = []
          for team in auth_state["teams"]:
            if team.get("organization_id") != access_org_id:
              continue
            access_teams.append(team["slug"])

          return access_teams

        c.GitHubOAuthenticator.auth_state_groups_key = access_team_groups
      # mount shared directories for the collaboration groups
      # these are the _home_ directories of the collaboration accounts
      shared_directories: |
        import json

        with open("/etc/jupyterhub/access.json") as f:
            access = json.load(f)

        def mount_collaboration_directories(spawner):
            if not spawner.volume_mounts:
                spawner.volume_mounts = {}
            for group in spawner.user.groups:
                if group.name.endswith("@collaboration"):
                    name, *_ = group.name.rpartition("@")
                    # mount the user's home in shared/$group
                    # user (home subPath) = bids-comms@collaboration
                    # group = bids-comms@collaboration
                    spawner.volume_mounts[group.name] = {
                        "mountPath": f"/home/jovyan/shared/{name}",
                        "name": "home",
                        "subPath": group.name,
                    }
            if spawner.user.admin:
                # admins can manage the shared home directory
                spawner.volume_mounts["admin-home"] = {
                    # don't put this in the jupyter root
                    "mountPath": f"/home/all-home",
                    "name": "home",
                }

        c.Spawner.pre_spawn_hook = mount_collaboration_directories
      refresh_user: |
        def refresh_user_hook(authenticator, user, auth_state):
            if user.name.endswith("@collaboration"):
                # don't require refresh user auth for collaboration and testing accounts
                # (these aren't github users)
                return True
            # for all other users, refresh as usual
            return None

        c.OAuthenticator.refresh_user_hook = refresh_user_hook
      git_env: |
        # workaround https://github.com/jupyterhub/oauthenticator/pull/820
        def modify_auth_state(authenticator, auth_state):
            if auth_state.get("scope") and len(auth_state["scope"]) == 1:
                auth_state["scope"] = auth_state["scope"][0].split(",")
            return auth_state

        c.GitHubOAuthenticator.modify_auth_state_hook = modify_auth_state

        # populate github env
        def auth_state_hook(spawner, auth_state):
            if not auth_state:
                return
            github_user = auth_state["github_user"]
            spawner.env["GITHUB_TOKEN"] = auth_state["access_token"]
            spawner.env["GIT_AUTHOR_NAME"] = spawner.env["GIT_COMITTER_NAME"] = github_user["name"]
            if github_user["email"]:
                spawner.env["EMAIL"] = github_user["email"]

        # c.Spawner.auth_state_hook = auth_state_hook
      default_url: |
        def default_url(request):
          if request.current_user and request.current_user.admin:
            return '/hub/admin'
          return '/hub/spawn'

        c.JupyterHub.default_url = default_url
      cilogon_groups: |
        import json

        with open("/etc/jupyterhub/access.json") as f:
            access = json.load(f)

        c.OAuthenticator.admin_users = set(access["admin_users"])
        c.OAuthenticator.allowed_users = allowed_users = set(access["allowed_users"])

        collab_groups = {}
        for name, users in access["collaborations"].items():
          collab_username = f"{name}@collaboration"
          c.JupyterHub.load_roles.append({
            "name": collab_username.replace("@", "-"),
            "groups": [collab_username],
            "scopes": [
              "admin-ui",
              f"list:users!user={collab_username}",
              f"access:servers!user={collab_username}",
              f"admin:servers!user={collab_username}",
            ]
          })
          # define group membership while we're here
          for username in users:
            collab_groups.setdefault(username, []).append(collab_username)
            # grant access to users in collaborations
            # avoids need to duplicate listing in allowed_users
            allowed_users.add(username)

          allowed_users.add(f"{name}@collaboration")

        from jupyterhub.app import JupyterHub

        def collaboration_groups(auth_state):
          # we only get auth state here, not username
          # recompute username for group lookup
          # FIXME: this should be easier??
          authenticator = JupyterHub.instance().authenticator
          username = authenticator.user_info_to_username(auth_state["cilogon_user"])
          groups = collab_groups.get(username, [])
          authenticator.log.info(f"Loading groups for {username}: {groups}")
          return groups

        c.CILogonOAuthenticator.auth_state_groups_key = collaboration_groups
        c.OAuthenticator.manage_groups = True
    extraFiles:
      access:
        mountPath: /etc/jupyterhub/access.json
        # data in config.enc.yaml
  singleuser:
    # match lightcone.user_service_account
    serviceAccountName: demo-hub-user
    cloudMetadata:
      # needed for workload identity
      blockWithIptables: false
    memory:
      limit: 4G
      guarantee: 2G
    cpu:
      limit: 1
      guarantee: 0.5
    image:
      name: ghcr.io/bids/aifutureshub/user
      tag: main
      pullPolicy: Always
    extraEnv:
      OPENCODE_CONFIG: /etc/opencode-default/opencode.json
      # lightcone-cli image-build contract (tf/modules/lightcone/cloudbuild.tf):
      # content-addressed project images are built by GCP Cloud Build from
      # a staged-context tarball (no git involved) and pushed here.
      LIGHTCONE_REGISTRY: us-central1-docker.pkg.dev/bids-jupyterhub/demo-cloudbuild-images
      LIGHTCONE_BUILD_BUCKET: bids-jupyterhub-demo-lc-build
      LIGHTCONE_BUILD_SERVICE_ACCOUNT: demo-lc-build@bids-jupyterhub.iam.gserviceaccount.com
      # dask gateway
      DASK_GATEWAY__AUTH__TYPE: jupyterhub
      DASK_GATEWAY__ADDRESS: http://traefik-demo-dask-gateway/services/dask-gateway
      DASK_GATEWAY__PUBLIC_ADDRESS: /services/dask-gateway/
      DASK_GATEWAY__PROXY_ADDRESS: gateway://traefik-demo-dask-gateway:80
      DASK_GATEWAY__CLUSTER__OPTIONS__IMAGE: ghcr.io/bids/aifutureshub/user:main
    networkPolicy:
      egress:
        # Allow user pods to reach the dask-gateway traefik proxy: dask
        # clients dial scheduler comms through it (gateway:// scheme on
        # port 80).
        - to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/component: gateway
                  app.kubernetes.io/name: dask-gateway
            - podSelector:
                matchLabels:
                  app.kubernetes.io/component: traefik
                  app.kubernetes.io/name: dask-gateway
    extraFiles:
      opencode:
        mountPath: /etc/opencode-default/opencode.json
        data:
          $schema: "https://opencode.ai/config.json"
          model: nrp/qwen3
          disabled_providers:
            - opencode
          provider:
            nrp:
              npm: "@ai-sdk/openai-compatible"
              name: NRP
              options:
                baseURL: "https://ellm.nrp-nautilus.io/v1"
                apiKey: "{env:OPENAI_API_KEY}"
              models:
                kimi:
                  name: kimi
                  limit:
                    "context": 262144
                    "output": 32768
                  options:
                    chat_template_kwargs:
                      "thinking": true
                      "preserve_thinking": true
                  variants:
                    instruct:
                      chat_template_kwargs:
                        thinking: false
                        preserve_thinking: false
                qwen3:
                  name: qwen3
                qwen3-small:
                  name: qwen3-small
                gpt-oss:
                  name: gpt-oss
                gemma:
                  name: gemma
                gemma-small:
                  name: gemma-small
                glm-5:
                  name: glm-5
                minimax-m2:
                  name: minimax-m2
jupyterhub-home-nfs:
  prometheusExporter:
    enabled: true
  gke:
    enabled: true
    volumeId: projects/bids-jupyterhub/zones/us-central1-a/disks/hub-nfs-demo
  quotaEnforcer:
    # disable broken quota enforcer
    enabled: false
    hardQuota: "10" # in GiB
# ---- lightcone-cli compute -------------------------------------------------
# Auth rides JupyterHub (token pairing is automatic via the z2jh `hub`
# secret). The gateway config below stays close to a stock 2i2c daskhub:
# standard image/worker_cores/worker_memory/environment cluster options.
# lightcone-cli provisions its own worker env (resource advertisement,
# USER/LOGNAME/HOME, provenance image ref) through the `environment`
# option; the one deployment-specific piece is mounting each user's own
# home in scheduler/worker pods at the notebook's path.
dask-gateway:
  # must apply CRDs
  # kubectl apply -f https://raw.githubusercontent.com/dask/dask-gateway/2026.1.0/resources/helm/dask-gateway/crds/daskclusters.yaml
  enabled: true
  gateway:
    prefix: /services/dask-gateway
    auth:
      type: jupyterhub
    backend:
      scheduler:
        extraPodConfig:
          # Pin to the user node pool (like z2jh singleuser pods). Dask
          # pods are created by KubeBackend, not z2jh, so they don't
          # inherit its matchNodePurpose affinity; without this they can
          # land on the core node alongside the hub/proxy. No toleration
          # needed — the pools carry labels, not taints.
          nodeSelector:
            hub.jupyter.org/node-purpose: user
          volumes:
            - name: home
              persistentVolumeClaim:
                claimName: home-nfs-mount
        extraContainerConfig:
          imagePullPolicy: Always # mutable tags (e.g. :main) must not go stale
          # Project images are environment-agnostic (no USER baked in,
          # image builds run as root). Pod identity is deployment
          # config: run cluster pods as the notebook uid so everything
          # written to the NFS home stays user-owned. No passwd entry
          # is needed — lc provisions USER/LOGNAME/HOME into the pods
          # via the `environment` cluster option, which keeps
          # getpass.getuser() (snakemake startup) working.
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
      worker:
        extraPodConfig:
          nodeSelector:
            hub.jupyter.org/node-purpose: user
          volumes:
            - name: home
              persistentVolumeClaim:
                claimName: home-nfs-mount
        extraContainerConfig:
          imagePullPolicy: Always
          securityContext: # user-owned outputs; see scheduler note
            runAsUser: 1000
            runAsGroup: 1000
    extraConfig:
      hub_auth: |
        c.JupyterHubAuthenticator.jupyterhub_service_name = "dask-gateway"
      lightcone: |
        from dask_gateway_server.options import Options, Integer, Float, Mapping, String

        # Chart-values container config (imagePullPolicy above). Handler-
        # returned fields REPLACE the KubeClusterConfig traitlets, so
        # capture the base here and extend.
        _worker_ct = dict(c.KubeClusterConfig.worker_extra_container_config)
        _scheduler_ct = dict(c.KubeClusterConfig.scheduler_extra_container_config)

        def _with_home(container_config, username):
            # Mount the requesting user's OWN home (subPath = their
            # directory only, never the whole export) at /home/jovyan —
            # the same path as the notebook pod, so dask tasks see
            # identical absolute paths. subPath matches z2jh's storage
            # subPath "{unescaped_username}".
            if username.startswith("user:"):
                # dask gateway applies `user:` to usernames that contain a colon,
                # to avoid collisions,
                # which github usernames do in our deployment.
                # get the 'true' username back.
                username = username.partition(":")[2]
            mounts = list(container_config.get("volumeMounts", [])) + [
                {"name": "home", "mountPath": "/home/jovyan", "subPath": username},
            ]
            return {**container_config, "volumeMounts": mounts}

        def options_handler(options, user):
            # Stock daskhub shape: cores/memory/image/environment pass
            # straight through. Everything lightcone-specific (worker
            # resource advertisement, USER/LOGNAME/HOME for passwd-less
            # images, LIGHTCONE_WORKER_IMAGE provenance) is provisioned
            # by `lc run` itself through the standard `environment`
            # option — the only deployment-specific piece left is the
            # per-user home mount below.
            return {
                "worker_cores": options.worker_cores,
                "worker_memory": f"{options.worker_memory:.2f}G",
                "image": options.image,
                "worker_extra_container_config": _with_home(_worker_ct, user.name),
                "scheduler_extra_container_config": _with_home(_scheduler_ct, user.name),
                "environment": options.environment,
            }

        c.Backend.cluster_options = Options(
            Integer("worker_cores", default=2, min=1, max=8, label="Worker cores"),
            Float("worker_memory", default=4, min=1, max=16, label="Worker memory (GB)"),
            # Server-side fallback only: clients send their own notebook
            # image via DASK_GATEWAY__CLUSTER__OPTIONS__IMAGE (see the
            # jupyterhub extraConfig above).
            String("image", default="ghcr.io/bids/aifutureshub/user:main", label="Worker image"),
            Mapping("environment", default={}, label="Environment variables"),
            handler=options_handler,
        )

        # Reap clusters orphaned by a crashed client; `lc run` shuts its
        # own cluster down on exit.
        c.KubeClusterConfig.idle_timeout = 1800

        # Modern dask/distributed removed the legacy `dask-scheduler` /
        # `dask-worker` console scripts (gone in e.g. distributed
        # 2026.7.x, which lightcone project images carry); the chart
        # default still execs them, so scheduler pods die at exec with
        # "executable file not found". The `dask scheduler` / `dask
        # worker` subcommands exist since 2022.10 and take the same
        # flags (incl. --preload arg passthrough), so this is safe for
        # any plausible image.
        c.KubeClusterConfig.scheduler_cmd = ["dask", "scheduler"]
        c.KubeClusterConfig.worker_cmd = ["dask", "worker"]
  traefik:
    service:
      type: ClusterIP # reached via the hub proxy / in-cluster only
